            <h2>文章8-发个信息</h2>  
            <p>如果您想通过一台Windows给对方发送消息，可是又不想安装第三方软件怎么办呢？（对方必须是Windows）</p>  
            <p>通过WIN+R打开运行框，输入CMD进入一个黑色的窗口，在CMD中输入“Msg /server:192.168.1.144 * "你好"”</p> 
			<p>请复制：Msg /server:192.168.1.144 * "你好"</p>
			<p>IP地址以接收方IP地址为准，上方地址为示例！（CMD输入ipconfig/all即可查看IP，行开头：IPv4）</p>
			<p>发送信息可以自定，发送后会以弹窗方式发送！</p>
			<p>提示：如方式失败，请关闭两方防火墙</p>    
</article>
