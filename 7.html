            <h2>文章7-启动文件夹（IT技巧）</h2>  
            <p>为了便利，我们的软件几乎都支持开机自动启动，可我们会做一些程序，怎么才能实现开机自动运行呢？（此方式可用于软件）</p>  
            <p>通过WIN+R打开运行框，输入shell:startup进入一个文件夹，使用程序、文件、快捷方式被拖动到这个文件夹后就可以在开机时自动打开（速度有点慢）</p>
